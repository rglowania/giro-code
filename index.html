/* ═══════════════════════════════════════════════════════════════
   G-DESIGN — Template v1.1
   ═══════════════════════════════════════════════════════════════ */

/* ── Tokens ─────────────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:        #0c1410;
  --surface:   #13201a;
  --surface2:  #192b22;
  --border:    #213328;
  --accent:    #5d9e7a;
  --accent-lt: #89c4a2;
  --accent-dim:rgba(93,158,122,0.13);
  --text:      #ddeee5;
  --text-muted:#6e9480;
}
[data-theme="light"]{
  --bg:        #f0f7f3;
  --surface:   #ffffff;
  --surface2:  #e6f2eb;
  --border:    #bdd8c8;
  --accent:    #2e7a50;
  --accent-lt: #1e5c3a;
  --accent-dim:rgba(46,122,80,0.10);
  --text:      #0f1f16;
  --text-muted:#4d7a5e;
}
@media(prefers-color-scheme:light){
  :root:not([data-theme]){
    --bg:#f0f7f3;--surface:#ffffff;--surface2:#e6f2eb;--border:#bdd8c8;
    --accent:#2e7a50;--accent-lt:#1e5c3a;--accent-dim:rgba(46,122,80,0.10);
    --text:#0f1f16;--text-muted:#4d7a5e;
  }
}

/* ── Reset ──────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}

/* ── Body & Hintergrund-Grid ────────────────────────────────── */
body{
  background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;font-weight:300;
  min-height:100vh;padding:40px 20px 80px;
  transition:background .25s,color .25s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(93,158,122,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(93,158,122,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ── Layout ─────────────────────────────────────────────────── */
.container{max-width:720px;margin:0 auto;position:relative;z-index:1;}

/* ── Theme-Toggle ───────────────────────────────────────────── */
.theme-toggle{
  position:fixed;top:18px;right:20px;display:flex;gap:3px;
  z-index:1000;background:var(--surface);border:1px solid var(--border);padding:4px;
}
.theme-btn{
  width:28px;height:28px;background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all .2s;padding:0;
}
.theme-btn:hover{color:var(--accent);}
.theme-btn.active{color:var(--accent);background:var(--accent-dim);}
.theme-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Typografie ─────────────────────────────────────────────── */
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,44px);font-weight:600;
  line-height:1.15;color:var(--text);margin-bottom:10px;
}
h1 span{color:var(--accent);}
.subtitle{
  font-size:12px;color:var(--text-muted);
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;
}
.badge{
  display:inline-block;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);border:1px solid var(--accent-dim);padding:4px 14px;margin-bottom:18px;
}
.card-title{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;
}
.hint{font-size:10px;color:var(--text-muted);margin-top:5px;font-family:'IBM Plex Mono',monospace;line-height:1.5;}
.hint b{color:var(--accent-lt);}

/* ── Disclaimer ─────────────────────────────────────────────── */
.disclaimer{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--text-muted);line-height:1.7;opacity:.7;
  margin-top:32px;
}

/* ── Footer ─────────────────────────────────────────────────── */
footer{
  text-align:center;padding:32px 0 0;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:1px;color:var(--text-muted);opacity:.6;
}

/* ═══════════════════════════════════════════════════════════════
   ENDE G-DESIGN — App-spezifisches CSS
   ═══════════════════════════════════════════════════════════════ */

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  padding:28px 32px;
  margin-bottom:20px;
}

label{display:block;margin-bottom:16px;}
.lbl{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);display:block;margin-bottom:6px;
}
input,select,textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;
  padding:10px 14px;outline:none;transition:border-color .2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input.error{border-color:#e05c5c;}
textarea{resize:vertical;min-height:60px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:540px){.grid2{grid-template-columns:1fr;}}

.btn-primary{
  width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;
  transition:opacity .2s;margin-top:8px;
}
.btn-primary:hover{opacity:.85;}
.btn-secondary{
  padding:10px 20px;background:transparent;color:var(--accent);
  border:1px solid var(--accent);font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;
}
.btn-secondary:hover{background:var(--accent-dim);}

#result-card{display:none;}
#qr-wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;padding:24px;
}
#qr-wrap canvas,#qr-wrap img{
  border:6px solid #fff; /* weißer Rand für QR-Scan */
  display:block;
}
.raw-box{
  background:var(--surface2);border:1px solid var(--border);
  padding:14px 16px;font-family:'IBM Plex Mono',monospace;
  font-size:11px;line-height:1.8;color:var(--text-muted);
  white-space:pre;overflow-x:auto;width:100%;
}
.dl-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.err-msg{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:#e05c5c;margin-top:8px;display:none;
}

<script>
function setTheme(t) {
  if (t === 'system') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', t);
  }
  try { localStorage.setItem('g-theme', t); } catch(e){}
  document.querySelectorAll('.theme-btn').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('btn-' + t);
  if (btn) btn.classList.add('active');
}
(function(){
  var saved = 'system';
  try { saved = localStorage.getItem('g-theme') || 'system'; } catch(e){}
  setTheme(saved);
})();

/* ══════════════════════════════════════════════════════════════
   DATEI-UPLOAD & KI-EXTRAKTION
   ══════════════════════════════════════════════════════════════ */

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').style.borderColor = 'var(--border)';
  var file = e.dataTransfer.files[0];
  if (file) handleFileUpload(file);
}

function setUploadStatus(msg, isErr) {
  var el = document.getElementById('upload-status');
  el.textContent = msg;
  el.style.color = isErr ? '#e05c5c' : 'var(--accent)';
  el.style.display = msg ? 'block' : 'none';
}

async function handleFileUpload(file) {
  if (!file) return;
  var isPDF = file.type === 'application/pdf';
  var isImg = file.type.startsWith('image/');
  if (!isPDF && !isImg) { setUploadStatus('Nur PDF oder Bilddateien erlaubt.', true); return; }

  setUploadStatus('Wird analysiert …');

  try {
    var base64 = await new Promise(function(res, rej) {
      var r = new FileReader();
      r.onload = function() { res(r.result.split(',')[1]); };
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    var mediaType = file.type;

    var contentBlock = isPDF
      ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }
      : { type: 'image',    source: { type: 'base64', media_type: mediaType,           data: base64 } };

    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Du extrahierst Zahlungsdaten aus Dokumenten. Antworte NUR mit einem JSON-Objekt, kein Text davor oder danach, keine Markdown-Backticks. Format: {"name":"...","iban":"...","bic":"...","amount":"...","remittance":"..."}. Felder die nicht gefunden werden als leeren String "". IBAN immer ohne Leerzeichen. Betrag als deutsche Zahl z.B. "49,90" ohne Währungssymbol.',
        messages: [{
          role: 'user',
          content: [
            contentBlock,
            { type: 'text', text: 'Extrahiere alle Zahlungsdaten aus diesem Dokument: Empfängername, IBAN, BIC, Betrag, Verwendungszweck/Referenz.' }
          ]
        }]
      })
    });

    var data = await resp.json();
    var rawText = (data.content || []).map(function(b){ return b.text || ''; }).join('');
    var clean = rawText.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);

    // Ins Freitextfeld übernehmen + Parser laufen lassen
    var lines = [];
    if (parsed.name)       lines.push(parsed.name);
    if (parsed.iban)       lines.push(parsed.iban);
    if (parsed.amount)     lines.push(parsed.amount + ' EUR');
    if (parsed.remittance) lines.push(parsed.remittance);
    if (parsed.bic)        lines.push('BIC: ' + parsed.bic);

    if (lines.length === 0) {
      setUploadStatus('Keine Zahlungsdaten gefunden.', true);
      return;
    }

    document.getElementById('parse-input').value = lines.join('\n');
    runParser(lines.join('\n'));
    setUploadStatus('✓ ' + lines.length + ' Felder erkannt');

  } catch(err) {
    console.error(err);
    setUploadStatus('Fehler bei der Analyse. Bitte manuell eingeben.', true);
  }
}

/* ══════════════════════════════════════════════════════════════
   FREITEXT-PARSER
   ══════════════════════════════════════════════════════════════ */

var _parseDebounce = null;

function parseLive(el) {
  clearTimeout(_parseDebounce);
  _parseDebounce = setTimeout(function(){ runParser(el.value); }, 300);
}

function runParser(text) {
  var found = {};
  var lines = text.split(/[\r\n]+/).map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });

  // ── IBAN ──────────────────────────────────────────────────────
  // Suche in gesamtem Text (mit oder ohne Leerzeichen alle 4 Stellen)
  var ibanMatch = text.match(/\b([A-Z]{2}\s*\d{2}(?:\s*[A-Z0-9]{4}){1,7}(?:\s*[A-Z0-9]{1,3})?)\b/i);
  if (ibanMatch) {
    var raw = ibanMatch[1].replace(/\s/g,'').toUpperCase();
    if (validateIBAN(raw)) found.iban = raw;
  }

  // ── BIC ───────────────────────────────────────────────────────
  var bicMatch = text.match(/\b(?:BIC|SWIFT)[:\s]+([A-Z]{6}[A-Z0-9]{2}(?:[A-Z0-9]{3})?)\b/i);
  if (bicMatch) found.bic = bicMatch[1].toUpperCase();

  // ── Betrag ────────────────────────────────────────────────────
  // Alle gängigen Formate, inkl. "950 €", "€ 950", "950", "1.234,56", "1234.56"
  var amtPatterns = [
    /(?:EUR|€)\s*([\d]{1,3}(?:\.\d{3})*,\d{2})/i,     // EUR/€ 1.234,56
    /([\d]{1,3}(?:\.\d{3})*,\d{2})\s*(?:EUR|€)/i,      // 1.234,56 EUR/€
    /(?:EUR|€)\s*([\d]+,\d{1,2})/i,                     // EUR/€ 49,90 oder 49,9
    /([\d]+,\d{1,2})\s*(?:EUR|€)/i,                     // 49,90 EUR/€
    /(?:EUR|€)\s*([\d]{1,3}(?:,\d{3})*\.\d{2})/i,      // EUR/€ 1,234.56
    /([\d]{1,3}(?:,\d{3})*\.\d{2})\s*(?:EUR|€)/i,      // 1,234.56 EUR/€
    /(?:EUR|€)\s*([\d]+\.?\d*)/i,                        // EUR/€ 950 oder EUR/€ 950.00
    /([\d]+\.?\d*)\s*(?:EUR|€)/i,                        // 950 EUR/€ oder 950 €
    /(?:Betrag|Amount|Summe|Total)[:\s]*([\d]{1,3}(?:[.,]\d{3})*[.,]\d{1,2})/i,
    /(?:Betrag|Amount|Summe|Total)[:\s]*([\d]+)/i,
  ];
  for (var i = 0; i < amtPatterns.length; i++) {
    var m = text.match(amtPatterns[i]);
    if (m) { found.amount = m[1]; break; }
  }

  // ── Name ──────────────────────────────────────────────────────
  // 1. Mit Schlüsselwort
  var nameMatch = text.match(/(?:Empfänger|Begünstigte?r?|Zahlungsempfänger|Name|An|Payee|Beneficiary)\s*[:\-]\s*([^\n\r,]{2,70})/i);
  if (nameMatch) {
    found.name = nameMatch[1].trim().replace(/\s+/g,' ');
  } else {
    // 2. Zeilen-Fallback: erste Zeile die keine IBAN, kein Betrag, kein BIC, keine Zahl ist
    for (var j = 0; j < lines.length; j++) {
      var l = lines[j];
      // Überspringen: IBAN-Zeile
      if (/^[A-Z]{2}\d{2}/i.test(l.replace(/\s/g,''))) continue;
      // Überspringen: Zeile enthält nur Zahl + optionale Währung
      if (/^[\d\s.,]+\s*(?:EUR|€|CHF)?$/i.test(l)) continue;
      // Überspringen: BIC-Muster
      if (/^[A-Z]{6}[A-Z0-9]{2,5}$/i.test(l)) continue;
      // Überspringen: sieht aus wie Schlüsselwort-Zeile
      if (/^(?:Betrag|IBAN|BIC|Verwendungszweck|Referenz|Betreff|Re\.|Re:)/i.test(l)) continue;
      // Überspringen: zu kurz
      if (l.length < 2) continue;
      found.name = l.substring(0, 70);
      break;
    }
  }

  // ── Verwendungszweck / Referenz ───────────────────────────────
  // 1. Mit Schlüsselwort
  var remMatch = text.match(/(?:Verwendungszweck|Betreff|Referenz|Reference|Purpose|Zweck|Re\.|Re:)\s*[:\-]?\s*([^\n\r]{1,140})/i);
  if (remMatch) {
    found.remittance = remMatch[1].trim();
  } else {
    // 2. Zeilen-Fallback: letzte Zeile die nicht Name, IBAN, Betrag oder BIC ist
    var usedName = found.name || '';
    var usedIban = found.iban || '';
    for (var k = lines.length - 1; k >= 0; k--) {
      var lk = lines[k];
      if (lk === usedName) continue;
      if (lk.replace(/\s/g,'').toUpperCase() === usedIban) continue;
      if (/^[A-Z]{2}\d{2}/i.test(lk.replace(/\s/g,''))) continue;
      if (/^[\d\s.,]+\s*(?:EUR|€|CHF)?$/i.test(lk)) continue;
      if (/^[A-Z]{6}[A-Z0-9]{2,5}$/i.test(lk)) continue;
      if (/^(?:Betrag|IBAN|BIC|Verwendungszweck|Referenz|Betreff)/i.test(lk)) continue;
      if (lk.length < 2) continue;
      // Nicht denselben wie Name nehmen
      if (lk === found.name) continue;
      found.remittance = lk.substring(0, 140);
      break;
    }
  }

  // ── Chips rendern ─────────────────────────────────────────────
  renderChips(found);

  // ── Felder befüllen ───────────────────────────────────────────
  if (found.iban) {
    var ibanEl = document.getElementById('iban');
    ibanEl.value = found.iban;
    document.getElementById('iban-display').textContent = ibanFormatted(found.iban);
    lookupBIC(found.iban);
  }
  if (found.bic && !document.getElementById('bic').dataset.userEdited) {
    document.getElementById('bic').value = found.bic;
  }
  if (found.name) {
    document.getElementById('name').value = found.name.substring(0,70);
  }
  if (found.amount) {
    // Normalisieren: 1.234,56 → Rohwert für das Feld
    var amtRaw = found.amount;
    document.getElementById('amount').value = amtRaw;
    _rawAmount = amtRaw;
    // Blur-Format aufrufen
    fmtAmountBlur(document.getElementById('amount'));
  }
  if (found.remittance) {
    document.getElementById('remittance').value = found.remittance.substring(0,140);
  }
}

function renderChips(found) {
  var wrap = document.getElementById('parse-result');
  var chips = document.getElementById('parse-chips');
  var labels = {
    name: 'Name',
    iban: 'IBAN',
    bic: 'BIC',
    amount: 'Betrag',
    remittance: 'Verwendungszweck'
  };
  chips.innerHTML = '';
  var any = false;
  Object.keys(labels).forEach(function(k){
    if (found[k]) {
      any = true;
      var chip = document.createElement('div');
      chip.style.cssText = 'background:var(--accent-dim);border:1px solid var(--accent);padding:4px 10px;font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--accent);letter-spacing:0.5px;';
      var val = found[k];
      if (k==='iban') val = ibanFormatted(val);
      chip.textContent = labels[k] + ': ' + val;
      chips.appendChild(chip);
    }
  });
  wrap.style.display = any ? 'block' : 'none';
}

/* ── Betrag-Formatting ──────────────────────────────────────── */
var _rawAmount = ''; // immer roher Eingabewert (z.B. "1234,56" oder "1.234,56")

function fmtAmountFocus(el) {
  // Beim Fokus: nur Ziffern + Komma zeigen (kein Tausenderpunkt)
  var v = _rawAmount.replace(/\./g,'');
  el.value = v || '';
}
function fmtAmountInput(el) {
  _rawAmount = el.value;
}
function fmtAmountBlur(el) {
  var v = (el.value || '').replace(/\./g,'').replace(',','.');
  var n = parseFloat(v);
  if (!isNaN(n)) {
    var formatted = n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
    el.value = formatted;
    _rawAmount = formatted;
  }
}

function parseAmount(s) {
  if (!s || !s.trim()) return NaN;
  // Deutsches Format: 1.234,56 — Punkte als Tausender entfernen, Komma → Punkt
  return parseFloat(s.trim().replace(/\./g,'').replace(',','.'));
}

/* ── IBAN-Formatting & Anzeige ──────────────────────────────── */
function ibanRaw(val) {
  return val.replace(/\s/g,'').toUpperCase();
}
function ibanFormatted(raw) {
  return raw.replace(/(.{4})/g,'$1 ').trim();
}
function ibanInput(el) {
  var raw = ibanRaw(el.value);
  el.value = raw; // intern immer raw halten
  document.getElementById('iban-display').textContent = ibanFormatted(raw);
  if (raw.length >= 15) lookupBIC(raw);
}
function ibanFocus(el) {
  // Display ausblenden, echter Input sichtbar
  el.style.color = 'var(--text)';
  document.getElementById('iban-display').style.display = 'none';
}
function ibanBlur(el) {
  var raw = ibanRaw(el.value);
  el.value = raw;
  el.style.color = 'transparent';
  document.getElementById('iban-display').style.display = 'block';
  document.getElementById('iban-display').textContent = ibanFormatted(raw);
}

/* ── BIC-Lookup via openiban.com ────────────────────────────── */
var _bicLookupTimer = null;
function lookupBIC(iban) {
  clearTimeout(_bicLookupTimer);
  _bicLookupTimer = setTimeout(function(){
    if (!validateIBAN(iban)) return;
    document.getElementById('bic-loading').style.display = 'inline';
    fetch('https://openiban.com/validate/' + encodeURIComponent(iban) + '?getBIC=true&validateBankCode=true')
      .then(function(r){ return r.json(); })
      .then(function(data){
        document.getElementById('bic-loading').style.display = 'none';
        if (data && data.bankData && data.bankData.bic) {
          var bicEl = document.getElementById('bic');
          if (!bicEl.dataset.userEdited) {
            bicEl.value = data.bankData.bic;
          }
        }
      })
      .catch(function(){
        document.getElementById('bic-loading').style.display = 'none';
      });
  }, 600);
}

/* ── IBAN-Basis-Validierung ─────────────────────────────────── */
function validateIBAN(iban) {
  iban = iban.replace(/\s/g,'').toUpperCase();
  if (!/^[A-Z]{2}[0-9]{2}[A-Z0-9]{1,30}$/.test(iban)) return false;
  var rearranged = iban.slice(4) + iban.slice(0,4);
  var numeric = rearranged.split('').map(function(c){
    return isNaN(c) ? (c.charCodeAt(0)-55).toString() : c;
  }).join('');
  var remainder = 0;
  for (var i=0;i<numeric.length;i++) {
    remainder = (remainder*10 + parseInt(numeric[i])) % 97;
  }
  return remainder === 1;
}

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('bic').addEventListener('input', function(){
    this.dataset.userEdited = '1';
  });
  document.getElementById('iban-display').style.display = 'block';
});

/* ── EPC-String aufbauen ────────────────────────────────────── */
function buildEPC(fields) {
  var amtFormatted = 'EUR' + fields.amount.toFixed(2);
  var lines = [
    'BCD',                   // Service Tag
    '002',                   // Version
    '1',                     // Character set (UTF-8)
    'SCT',                   // Identification
    fields.bic,              // BIC (optional)
    fields.name,             // Beneficiary name
    fields.iban,             // IBAN
    amtFormatted,            // Amount
    fields.purpose,          // Purpose code
    fields.remtype === 'structured' ? fields.remittance : '',  // Structured ref
    fields.remtype === 'unstructured' ? fields.remittance : '', // Unstructured
    ''                       // Information (not used in QR data per spec)
  ];
  // trailing empty lines entfernen
  while (lines.length > 0 && lines[lines.length-1] === '') lines.pop();
  return lines.join('\n');
}

/* ── Validierung ────────────────────────────────────────────── */
function showErr(msg) {
  var el = document.getElementById('err-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function validate(fields) {
  if (!fields.name.trim()) return 'Name des Begünstigten ist pflicht.';
  if (!fields.iban.trim()) return 'IBAN ist pflicht.';
  if (!validateIBAN(fields.iban)) return 'IBAN ungültig (Prüfsumme fehlgeschlagen).';
  if (isNaN(fields.amount) || fields.amount < 0.01 || fields.amount > 999999999.99)
    return 'Betrag muss zwischen 0,01 und 999.999.999,99 EUR liegen.';
  if (fields.name.length > 70) return 'Name max. 70 Zeichen.';
  if (fields.bic && !/^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$/.test(fields.bic))
    return 'BIC ungültig.';
  if (fields.remittance.length > 140) return 'Verwendungszweck max. 140 Zeichen.';
  return null;
}

/* ── Hauptfunktion ──────────────────────────────────────────── */
var _lastEPC = '';
var _lastFields = null;

function generate() {
  showErr('');
  var fields = {
    name:      document.getElementById('name').value.trim(),
    iban:      ibanRaw(document.getElementById('iban').value),
    bic:       document.getElementById('bic').value.trim().toUpperCase(),
    amount:    parseAmount(document.getElementById('amount').value),
    purpose:   document.getElementById('purpose').value,
    remittance:document.getElementById('remittance').value.trim(),
    remtype:   document.getElementById('remtype').value,
    info:      document.getElementById('info').value.trim()
  };

  var err = validate(fields);
  if (err) { showErr(err); return; }
  _lastFields = fields;

  var epc = buildEPC(fields);
  _lastEPC = epc;

  var size = parseInt(document.getElementById('qrsize').value);
  var ecl  = document.getElementById('ecl').value;

  // QR rendern (mit Quiet Zone)
  var wrap = document.getElementById('qr-canvas');
  wrap.innerHTML = '';
  var quiet = Math.round(size * 0.06); // ~4 Module Rand
  var innerSize = size - quiet * 2;
  // Erst auf Hilfs-Canvas rendern
  var tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = innerSize; tmpCanvas.height = innerSize;
  QrCreator.render({
    text: epc,
    radius: 0,
    ecLevel: ecl,
    fill: '#000000',
    background: '#ffffff',
    size: innerSize
  }, tmpCanvas);
  // Dann auf sichtbaren Canvas mit weißem Rand
  var visCanvas = document.createElement('canvas');
  visCanvas.width = size; visCanvas.height = size;
  var vctx = visCanvas.getContext('2d');
  vctx.fillStyle = '#ffffff';
  vctx.fillRect(0, 0, size, size);
  vctx.drawImage(tmpCanvas, quiet, quiet);
  wrap.appendChild(visCanvas);
  visCanvas.style.display = 'block';
  visCanvas.style.margin = '0 auto';

  // Info-Text
  var info = document.getElementById('qr-info');
  info.innerHTML = fields.name
    + ' &nbsp;·&nbsp; '
    + fields.iban
    + ' &nbsp;·&nbsp; '
    + fields.amount.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' EUR'
    + (fields.info ? '<br>' + fields.info : '');

  // Rohdaten
  document.getElementById('raw-box').textContent = epc;

  // Karte zeigen
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ── Bild-Erzeugung (gemeinsam für Modal + Download) ─────────── */
function buildOutputCanvas() {
  var qrCanvas = document.querySelector('#qr-canvas canvas');
  if (!qrCanvas || !_lastFields) return null;
  var f = _lastFields;
  var qrSize = qrCanvas.width;

  var lines = [
    { label: 'Empfänger', value: f.name },
    { label: 'IBAN',      value: ibanFormatted(f.iban) },
    { label: 'Betrag',    value: f.amount.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' EUR' },
  ];
  if (f.remittance) lines.push({ label: 'Referenz', value: f.remittance });
  if (f.bic)        lines.push({ label: 'BIC',      value: f.bic });

  var pad     = 14;
  var sepH    = 12;
  var lineH   = 16;
  var labelW  = 68;
  var headerH = 20;
  var footerH = 16;
  var textBlockH = headerH + lines.length * lineH + 8;

  var measureCanvas = document.createElement('canvas');
  var mctx = measureCanvas.getContext('2d');
  mctx.font = '9px "Courier New", monospace';
  var maxTextW = mctx.measureText('SEPA ÜBERWEISUNG  ·  GiroCode').width;
  lines.forEach(function(row) {
    var w = labelW + mctx.measureText(row.value).width;
    if (w > maxTextW) maxTextW = w;
  });
  var totalW  = Math.max(qrSize, Math.ceil(maxTextW)) + pad * 2;
  var totalH  = pad + qrSize + sepH + 1 + 8 + textBlockH + footerH + pad;

  var dpr = 3;
  var out = document.createElement('canvas');
  out.width  = totalW * dpr;
  out.height = totalH * dpr;
  var ctx = out.getContext('2d');
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, totalW, totalH);

  // QR zentriert
  var qrX = Math.round((totalW - qrSize) / 2);
  ctx.drawImage(qrCanvas, qrX, pad, qrSize, qrSize);

  var lineY = pad + qrSize + sepH;
  ctx.strokeStyle = '#c8ddd2';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(pad, lineY);
  ctx.lineTo(totalW - pad, lineY);
  ctx.stroke();

  var curY = lineY + 8 + 9;
  ctx.fillStyle = '#2e7a50';
  ctx.font = 'bold 9px "Courier New", monospace';
  ctx.fillText('SEPA ÜBERWEISUNG  ·  GiroCode', pad, curY);
  curY += lineH;

  lines.forEach(function(row) {
    ctx.fillStyle = '#6e9480';
    ctx.font = '8px "Courier New", monospace';
    ctx.fillText(row.label, pad, curY);
    ctx.fillStyle = '#0f1f16';
    ctx.font = '9px "Courier New", monospace';
    ctx.fillText(row.value, pad + labelW, curY);
    curY += lineH;
  });

  ctx.fillStyle = '#bbbbbb';
  ctx.font = '7px "Courier New", monospace';
  ctx.fillText('GiroCode · Robin Glowania', pad, totalH - 5);

  return out;
}

/* ── Bild anzeigen (Modal) ───────────────────────────────────── */
function showImage() {
  var out = buildOutputCanvas();
  if (!out) { alert('Bitte zuerst QR-Code generieren.'); return; }
  var dataUrl = out.toDataURL('image/png');

  var modal = document.getElementById('img-modal');
  document.getElementById('modal-img').src = dataUrl;

  // iOS erkennen
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var hint  = document.getElementById('modal-hint');
  var dlBtn = document.getElementById('modal-dl');

  if (isIOS) {
    hint.textContent = 'Bild lange drücken → „Bild sichern" → wird in der Foto-App gespeichert';
    dlBtn.style.display = 'none';
  } else {
    hint.textContent = '';
    dlBtn.href = dataUrl;
    dlBtn.style.display = 'inline-block';
  }

  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('img-modal').style.display = 'none';
}

/* ── EPC-String kopieren ────────────────────────────────────── */
function copyRaw() {
  if (!_lastEPC) return;
  navigator.clipboard.writeText(_lastEPC).then(function(){
    var btn = event.target;
    var orig = btn.textContent;
    btn.textContent = '✓ Kopiert';
    setTimeout(function(){ btn.textContent = orig; }, 1800);
  }).catch(function(){
    prompt('EPC-String:', _lastEPC);
  });
}
